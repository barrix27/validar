<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Login - Rosa</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  
  <style>
    /* Fondo con degradado en tonos rosas */
    body {
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      margin: 0;
    }

    /* Estilo de la tarjeta */
    .card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(255, 105, 180, 0.3); /* Sombra rosada suave */
    }

    .card-header {
      background-color: transparent;
      border-bottom: none;
      font-weight: bold;
      font-size: 1.6rem;
      color: #d63384; /* Rosa oscuro */
      text-align: center;
      padding-top: 30px;
    }

    /* Botón Rosa Fucsia */
    .btn-primary {
      background-color: #ff4d94;
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background-color: #e60073;
      transform: translateY(-2px); /* Pequeño salto al pasar el mouse */
      box-shadow: 0 5px 15px rgba(255, 77, 148, 0.4);
    }

    /* Input focus - Resalte rosa al escribir */
    .form-control:focus {
      border-color: #ff4d94;
      box-shadow: 0 0 0 0.2rem rgba(255, 77, 148, 0.25);
    }

    label {
      color: #854d6d;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card p-4">
          <div class="card-header">¡Hola de nuevo!</div>
          <div class="card-body">
            <form action="validar.php" method="post">
              <div class="form-group">
                <label for="usuario">Usuario</label>
                <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Tu nombre" required>
              </div>
              <div class="form-group">
                <label for="contrasena">Contraseña</label>
                <input type="password" class="form-control" id="contrasena" name="contrasena" placeholder="••••••••" required>
              </div>
              <button type="submit" class="btn btn-primary mt-3">Iniciar Sesión</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
